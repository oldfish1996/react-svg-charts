name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Validate tag matches package version
        run: |
          TAG="${{ inputs.tag }}"
          TAG="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG"
          echo "package.json=$PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag version does not match package.json version."
            exit 1
          fi

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

      - name: Publish to npm (trusted publishing)
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if echo "$PKG_VERSION" | grep -q '-'; then
            NPM_TAG=next
          else
            NPM_TAG=latest
          fi
          npm publish --access public --tag "$NPM_TAG" --provenance --registry https://registry.npmjs.org
