name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Validate tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG"
          echo "package.json=$PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json $PKG_VERSION"
            exit 1
          fi

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

      - name: Publish to npm
        # 注意：账户开启 2FA 时，NPM_TOKEN 必须使用 "Automation" 类型的 token，
        # 否则会因为要求输入 OTP 而发布失败。
        # 这里不显式传 --registry，避免覆盖 setup-node 写入 .npmrc 的鉴权配置（按 registry URL 做 key 匹配）。
        # --provenance 与 permissions.id-token: write 配合，启用 npm 来源证明。
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if echo "$PKG_VERSION" | grep -q '-'; then
            NPM_TAG=next
          else
            NPM_TAG=latest
          fi
          npm publish --access public --tag "$NPM_TAG" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
